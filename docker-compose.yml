# AutoMate — one-command local stack: `docker compose up --build`
# Frontend: http://localhost:8080   Backend API/docs: http://localhost:8000/docs
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/automate.db
      # Allow the containerized frontend (8080) and a local Vite dev server (5173)
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      # Set LLM_ENABLED=true and OPENAI_API_KEY to enable LLM function-calling NLU
      LLM_ENABLED: "false"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle; must be the address the browser uses for the API
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
